name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install ruff
      - run: ruff check backend/ bots/ shared/

  test-backend:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: sudo apt-get update && sudo apt-get install -y libpq-dev
      - run: pip install -r backend/requirements.txt
      - name: Django tests
        env:
          DJANGO_SETTINGS_MODULE: settings_test
          PYTHONPATH: ${{ github.workspace }}/backend:${{ github.workspace }}
          INTEGRATION_API_KEY: test-key
          BOT_TOKEN: "000000000:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA"
        working-directory: backend
        run: python manage.py test --top-level-directory . --verbosity=2

  test-bot:
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: lakshmi_test
          POSTGRES_USER: lakshmi
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U lakshmi -d lakshmi_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: bots/customer_bot/requirements.txt
      - run: pip install -r bots/customer_bot/requirements.txt pytest
      - name: Bot tests
        env:
          PYTHONPATH: ${{ github.workspace }}
          BOT_TOKEN: "000000000:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA"
          POSTGRES_HOST: localhost
          POSTGRES_DB: lakshmi_test
          POSTGRES_USER: lakshmi
          POSTGRES_PASSWORD: testpass
          POSTGRES_PORT: "5432"
        run: python -m pytest bots/customer_bot/tests/ -v

  docker-build:
    runs-on: ubuntu-latest
    needs: [test-backend, test-bot]
    steps:
      - uses: actions/checkout@v4
      - name: Verify Docker images build
        run: docker compose build app customer_bot
