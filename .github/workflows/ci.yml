name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install ruff
      - run: ruff check backend/ bots/ shared/

  test-backend:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: sudo apt-get update && sudo apt-get install -y libpq-dev
      - run: pip install -r backend/requirements.txt
      - name: Django tests
        env:
          DJANGO_SETTINGS_MODULE: settings_test
          PYTHONPATH: backend:${{ github.workspace }}
          INTEGRATION_API_KEY: test-key
        run: python backend/manage.py test --verbosity=2

  test-bot:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: bots/customer_bot/requirements.txt
      - run: pip install -r bots/customer_bot/requirements.txt pytest
      - name: Bot tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: python -m pytest bots/customer_bot/tests/ -v

  docker-build:
    runs-on: ubuntu-latest
    needs: [test-backend, test-bot]
    steps:
      - uses: actions/checkout@v4
      - name: Verify Docker images build
        run: docker compose build app customer_bot
