services:

  promtail:
    image: grafana/promtail:2.9.6
    container_name: promtail
    ports:
      - "127.0.0.1:9080:9080"
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./infra/observability/promtail-config.yaml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    security_opt:
      - no-new-privileges:true
    networks:
      - monitoring
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  loki:
    image: grafana/loki:2.9.6
    container_name: loki
    ports:
      - "127.0.0.1:3100:3100"
    volumes:
      - ./infra/observability/loki-config.yaml:/etc/loki/local-config.yaml
      - lokidata:/loki
    networks:
      - monitoring
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  prometheus:
    image: prom/prometheus:v2.48.1
    container_name: prometheus
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./infra/observability/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./infra/observability/alerts.yml:/etc/prometheus/alerts.yml
      - prometheusdata:/prometheus
    networks:
      - monitoring
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  grafana:
    image: grafana/grafana:10.4.3
    container_name: grafana
    env_file: .env
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_SERVER_ROOT_URL: "${PUBLIC_BASE_URL:-http://localhost:8000}/grafana/"
    volumes:
      - ./infra/observability/grafana/datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml
      - ./infra/observability/grafana/dashboards.yaml:/etc/grafana/provisioning/dashboards/dashboards.yaml
      - ./infra/observability/grafana/json:/etc/grafana/provisioning/dashboards/json
      - grafanadata:/var/lib/grafana
    networks:
      - monitoring
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  db:
    image: postgres:17
    env_file: .env
    restart: always
    container_name: db
    # ports:
    #   - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - db_backups:/var/lib/postgresql/backups
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U lakshmi -d lakshmi" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend
      - bot
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  app:
    build:
      context: .
      dockerfile: infra/docker/backend/Dockerfile
    env_file: .env
    environment:
      PYTHONPATH: /app/backend:/app
      DJANGO_SETTINGS_MODULE: settings
    working_dir: /app
    depends_on:
      db:
        condition: service_healthy
    restart: always
    container_name: app
    volumes:
      - static:/app/backend/collected_static
      - media:/app/backend/media
    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS http://127.0.0.1:8000/healthz/ || exit 1" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - backend
      - monitoring
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  celery_worker:
    build:
      context: .
      dockerfile: infra/docker/backend/Dockerfile
    env_file: .env
    container_name: celery_worker
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PYTHONPATH: /app/backend:/app
      DJANGO_SETTINGS_MODULE: settings
      POSTGRES_HOST: db
    entrypoint: ["celery"]
    command: ["-A", "celeryapp", "worker", "--loglevel=info", "--max-tasks-per-child=1000"]
    healthcheck:
      test: ["CMD-SHELL", "celery -A celeryapp inspect ping --timeout 10 2>/dev/null | grep -q pong || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 30s
    networks:
      - backend
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    volumes:
      - media:/app/backend/media

  celery_beat:
    build:
      context: .
      dockerfile: infra/docker/backend/Dockerfile
    env_file: .env
    container_name: celery_beat
    restart: always
    depends_on:
      db:
        condition: service_healthy
      celery_worker:
        condition: service_started
      redis:
        condition: service_healthy
    environment:
      PYTHONPATH: /app/backend:/app
      DJANGO_SETTINGS_MODULE: settings
      POSTGRES_HOST: db
    entrypoint: ["celery"]
    command: ["-A", "celeryapp", "beat", "--loglevel=info", "--scheduler", "django_celery_beat.schedulers:DatabaseScheduler"]
    networks:
      - backend
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    volumes:
      - media:/app/backend/media

  # One-off services for setup tasks (run with --profile setup)
  migrate:
    build:
      context: .
      dockerfile: infra/docker/backend/Dockerfile
    env_file: .env
    environment:
      PYTHONPATH: /app/backend:/app
      DJANGO_SETTINGS_MODULE: settings
    working_dir: /app/backend
    depends_on:
      db:
        condition: service_healthy
    entrypoint: ["python", "manage.py"]
    command: ["migrate", "--noinput"]
    networks:
      - backend
    profiles: ["setup"]

  collectstatic:
    build:
      context: .
      dockerfile: infra/docker/backend/Dockerfile
    env_file: .env
    environment:
      PYTHONPATH: /app/backend:/app
      DJANGO_SETTINGS_MODULE: settings
    working_dir: /app/backend
    entrypoint: ["python", "manage.py"]
    command: ["collectstatic", "--noinput"]
    volumes:
      - static:/app/backend/collected_static
    networks:
      - backend
    profiles: ["setup"]

  # One-off билд Photo Studio в shared volume photo_studio_dist.
  # Запуск: docker compose --profile setup run --rm photo_studio_build
  photo_studio_build:
    build:
      context: ./photo-studio
      args:
        VITE_API_BASE_URL: ${PUBLIC_BASE_URL:-}
    volumes:
      - photo_studio_dist:/out
    profiles: ["setup"]

  redis:
    image: redis:7
    container_name: redis
    ports:
      - "127.0.0.1:6379:6379"
    restart: always
    environment:
      REDIS_PASSWORD: "${REDIS_PASSWORD}"
      REDISCLI_AUTH: "${REDIS_PASSWORD}"
    volumes:
      - redis_data:/data
      - ./infra/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - ./infra/redis/docker-entrypoint.sh:/usr/local/bin/docker-entrypoint.sh:ro
    entrypoint: ["/usr/local/bin/docker-entrypoint.sh"]
    command: []
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    build: ./infra/nginx/
    depends_on:
      app:
        condition: service_healthy
    restart: always
    ports:
      - "8000:80"
    environment:
      SERVER_NAME: ${SERVER_NAME:-_}
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/templates/default.conf.template:ro
      - ./infra/nginx/rate-limit.conf:/etc/nginx/conf.d/00-rate-limit.conf:ro
      - static:/app/backend/collected_static
      - media:/app/backend/media
      - photo_studio_dist:/usr/share/nginx/photo-studio:ro
    networks:
      - backend
      - monitoring
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  metabase:
    image: metabase/metabase:v0.50.36
    container_name: metabase
    restart: unless-stopped
    environment:
      MB_DB_FILE: ${MB_DB_FILE:-/metabase-data/metabase.db}
      MB_JETTY_HOST: ${MB_JETTY_HOST:-0.0.0.0}
      MB_JETTY_PORT: ${MB_JETTY_PORT:-3000}
      MB_SITE_URL: ${MB_SITE_URL:-https://lakshmi-shop.ru/metabase/}
    volumes:
      - metabase-data:/metabase-data
    depends_on:
      - db
    ports:
      - "127.0.0.1:3001:3000"
    networks:
      - backend
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  customer_bot:
    build:
      context: .
      dockerfile: infra/docker/bots/Dockerfile
    env_file: .env
    environment:
      PYTHONPATH: /app
    container_name: customer_bot
    restart: always
    depends_on:
      app:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./bots/customer_bot/qr_codes:/app/bots/customer_bot/qr_codes
    networks:
      - bot
      - backend
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  courier_bot:
    build:
      context: .
      dockerfile: infra/docker/bots/Dockerfile.courier
    env_file: .env
    environment:
      PYTHONPATH: /app
    container_name: courier_bot
    restart: always
    depends_on:
      app:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - bot
      - backend
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  picker_bot:
    build:
      context: .
      dockerfile: infra/docker/bots/Dockerfile.picker
    env_file: .env
    environment:
      PYTHONPATH: /app
    container_name: picker_bot
    restart: always
    depends_on:
      app:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - bot
      - backend
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

networks:
  backend:
    driver: bridge
  monitoring:
    driver: bridge
  bot:
    driver: bridge

volumes:
  static:
  media:
  pg_data:
  db_backups:
  lokidata:
  grafanadata:
  prometheusdata:
  metabase-data:
  redis_data:
  photo_studio_dist:
