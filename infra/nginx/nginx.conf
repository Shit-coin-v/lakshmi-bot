# SSL/TLS: This nginx runs behind an external reverse proxy (Cloudflare, Caddy, etc.)
# SSL termination happens at the external proxy. See docs/DEPLOYMENT.md

server {
    listen 80;
    server_name ${SERVER_NAME};

    # Docker DNS (for proxy_pass with variables)
    resolver 127.0.0.11 ipv6=off valid=10s;

    # Upstream address variables
    set $backend  http://app:8000;
    set $metabase http://metabase:3000;
    set $grafana  http://grafana:3000;

    set $forwarded_proto $scheme;
    if ($http_x_forwarded_proto != "") {
        set $forwarded_proto $http_x_forwarded_proto;
    }

    # Security headers and limits
    client_max_body_size 20m;
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header Referrer-Policy strict-origin-when-cross-origin;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()";

    # Healthcheck
    location = /nginx/health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # --- Django static files ---
    location /static/ {
        alias /app/backend/collected_static/;
        expires 30d;
        access_log off;
    }

    # --- QR codes (narrow path first) ---
    location /media/qr/ {
        alias /app/backend/media/qr_codes/;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # --- All other media ---
    location /media/ {
        alias /app/backend/media/;
        access_log off;
    }

    # --- Application metrics ---
    location /metrics {
        allow 127.0.0.1;
        allow 172.16.0.0/12;
        deny all;

        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        proxy_pass $backend;
    }

    # --- Metabase ---
    location = /metabase { return 301 /metabase/; }
    location /metabase/ {
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Prefix /metabase/;

        proxy_connect_timeout 3s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
        proxy_http_version    1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $http_connection;

        proxy_pass http://metabase:3000/;
        proxy_redirect off;
    }

    # --- Grafana ---
    location = /grafana { return 301 /grafana/; }
    location /grafana/ {
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Prefix /grafana/;

        proxy_connect_timeout 3s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
        proxy_http_version    1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $http_connection;

        proxy_pass $grafana/;
        proxy_redirect off;
    }

    # --- 1C integration (separate rate limit) ---
    location /onec/ {
        limit_req zone=onec burst=100 nodelay;

        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        proxy_connect_timeout 3s;
        proxy_send_timeout    60s;
        proxy_pass $backend;
    }

    # --- Photo Studio SPA (статика из volume photo_studio_dist) ---
    # Должно быть ВЫШЕ "location /", иначе попадёт в Django catch-all.
    # Vite собирается с base: '/photo-studio/'.
    #
    # Assets (хешированные имена файлов) кешируем агрессивно;
    # index.html и manifest — короткий TTL, чтобы видеть новый деплой.

    location ^~ /photo-studio/assets/ {
        alias /usr/share/nginx/photo-studio/assets/;
        try_files $uri =404;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /photo-studio/ {
        alias /usr/share/nginx/photo-studio/;
        try_files $uri $uri/ /photo-studio/index.html;
        add_header Cache-Control "public, max-age=300";
    }

    # --- Everything else to Django ---
    location / {
        limit_req zone=api burst=40 nodelay;

        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # Загрузка фото товара через OpenAI Image API (gpt-image-2) — до ~90 секунд.
        proxy_connect_timeout 3s;
        proxy_send_timeout    180s;
        proxy_read_timeout    180s;
        proxy_pass $backend;
    }
}
