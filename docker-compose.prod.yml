# Production overrides for docker-compose.yml
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  app:
    restart: always
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "10"

  celery_worker:
    restart: always
    # Scale: docker compose ... up -d --scale celery_worker=2
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M

  celery_beat:
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M

  nginx:
    restart: always
    ports:
      - "80:80"
      - "443:443"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

  db:
    restart: always
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  redis:
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M

  # On-demand backup service (I11)
  # Run: docker compose -f docker-compose.yml -f docker-compose.prod.yml --profile backup run --rm db_backup
  # Cron: 0 2 * * * cd /path && docker compose ... --profile backup run --rm db_backup
  db_backup:
    image: postgres:17
    container_name: db_backup
    restart: "no"
    env_file: .env
    environment:
      POSTGRES_HOST: db
      BACKUP_RETENTION_DAYS: "7"
    volumes:
      - db_backups:/backups
      - ./scripts/backup_cron.sh:/backup.sh:ro
    entrypoint: ["/bin/bash", "/backup.sh"]
    networks:
      - backend
    profiles:
      - backup
